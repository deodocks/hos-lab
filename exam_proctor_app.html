        }

    // --- SCHEDULING ALGORITHM ENGINE ---
    function generateProctorSchedule(teachers, settings) {
      const { daysCount, grades, classesPerGrade, scheduleMatrix } = settings;

      // Result storage
      const slots = []; // { id, day, period, grade, className, subject, mainProctorId, assistantProctorId, warnings: [] }

      // Tracking teacher duties
      const teacherStats = {};
      teachers.forEach(t => {
        teacherStats[t.id] = {
          total: 0,
          main: 0,
          assistant: 0,
          gradeCounts: { 2: 0, 3: 0, 1: 0 },
          busy: {} // busy[day][period] = true
        };
      });

      function isTeacherBusy(teacherId, day, period) {
        return teacherStats[teacherId].busy[`${day}-${period}`] === true;
      }

      function setTeacherBusy(teacherId, day, period, isBusy) {
        teacherStats[teacherId].busy[`${day}-${period}`] = isBusy;
      }

      // Generate all slot instances required
      let slotIdCounter = 1;
      for (let day = 1; day <= daysCount; day++) {
        const daySchedule = scheduleMatrix[day] || {};
        const periods = Object.keys(daySchedule).map(Number).sort((a,b)=>a-b);

        for (const period of periods) {
          const periodSubjects = daySchedule[period] || {};

          for (const grade of grades) {
            const subject = periodSubjects[grade] || '미지정';
            const classes = classesPerGrade[grade] || [];

            for (const className of classes) {
              slots.push({
                id: `SLOT-${slotIdCounter++}`,
                day,
                period,
                grade,
                className,
                subject,
                mainProctorId: null,
                assistantProctorId: null,
                warnings: []
              });
            }
          }
        }
      }

      // Helper function to find eligible candidates for a slot
      function getEligibleCandidates(slot, role, assignedMainId = null) {
        const { day, period, grade, className, subject } = slot;

        return teachers.filter(t => {
          // Rule 4: No Double Booking in same period
          if (isTeacherBusy(t.id, day, period)) return false;

          // Rule 2: No Homeroom Self-Assignment
          if (t.homeroom && t.homeroom === className) return false;

          // Rule 3: Subject Exclusion (Current exam subject teacher excluded)
          if (t.subject && t.subject.trim() === subject.trim()) return false;

          // If assigning Assistant Proctor, check Rule 1 (No Double Male)
          if (role === 'assistant' && assignedMainId) {
            const mainProctor = teachers.find(m => m.id === assignedMainId);
            if (mainProctor && mainProctor.gender === '남' && t.gender === '남') {
              return false; // Candidate is Male and Main is Male -> Violation!
            }
            if (t.id === assignedMainId) return false; // Cannot be same person
          }

          return true;
        });
      }

      // Sort candidates by fairness heuristics (prefer lower total duties)
      function sortCandidates(candidates, grade) {
        return [...candidates].sort((a, b) => {
          const statsA = teacherStats[a.id];
          const statsB = teacherStats[b.id];

          // Primary: Total assigned duties (Ascending)
          if (statsA.total !== statsB.total) {
            return statsA.total - statsB.total;
          }

          // Secondary: Grade balance (prefer teacher with fewer duties in this grade)
          const gradeA = statsA.gradeCounts[grade] || 0;
          const gradeB = statsB.gradeCounts[grade] || 0;
          if (gradeA !== gradeB) {
            return gradeA - gradeB;
          }

          // Random tie-breaker
          return Math.random() - 0.5;
        });
      }

      // Process allocation for each slot
      const totalSlotCount = slots.length;
      let unassignedCount = 0;

      for (const slot of slots) {
        // 1. Assign Main Proctor
        let mainCandidates = getEligibleCandidates(slot, 'main');
        mainCandidates = sortCandidates(mainCandidates, slot.grade);

        if (mainCandidates.length > 0) {
          const chosenMain = mainCandidates[0];
          slot.mainProctorId = chosenMain.id;
          setTeacherBusy(chosenMain.id, slot.day, slot.period, true);
          teacherStats[chosenMain.id].total += 1;
          teacherStats[chosenMain.id].main += 1;
          teacherStats[chosenMain.id].gradeCounts[slot.grade] = (teacherStats[chosenMain.id].gradeCounts[slot.grade] || 0) + 1;
        } else {
          slot.warnings.push('정감독 조건을 충족하는 교사 부족');
          unassignedCount++;
        }

        // 2. Assign Assistant Proctor
        let asstCandidates = getEligibleCandidates(slot, 'assistant', slot.mainProctorId);
        asstCandidates = sortCandidates(asstCandidates, slot.grade);

        if (asstCandidates.length > 0) {
          const chosenAsst = asstCandidates[0];
          slot.assistantProctorId = chosenAsst.id;
          setTeacherBusy(chosenAsst.id, slot.day, slot.period, true);
          teacherStats[chosenAsst.id].total += 1;
          teacherStats[chosenAsst.id].assistant += 1;
          teacherStats[chosenAsst.id].gradeCounts[slot.grade] = (teacherStats[chosenAsst.id].gradeCounts[slot.grade] || 0) + 1;
        } else {
          slot.warnings.push('부감독 조건을 충족하는 교사 부족 (남-남 금지 등)');
          unassignedCount++;
        }
      }

      // Constraint Auditor: Double check all slots for warnings
      slots.forEach(slot => {
        const main = teachers.find(t => t.id === slot.mainProctorId);
        const asst = teachers.find(t => t.id === slot.assistantProctorId);

        if (main && asst) {
          if (main.gender === '남' && asst.gender === '남') {
            slot.warnings.push('⚠️ [경고] 남교사 동시 배정 금지 위반');
          }
          if (main.homeroom === slot.className || asst.homeroom === slot.className) {
            slot.warnings.push('⚠️ [경고] 자기 반 담임 배정 금지 위반');
          }
          if (main.subject === slot.subject || asst.subject === slot.subject) {
            slot.warnings.push('⚠️ [경고] 해당 교시 과목 교사 배정 금지 위반');
          }
        }
      });

      return {
        slots,
        teacherStats,
        unassignedCount
      };
    }


    // --- MAIN REACT APPLICATION COMPONENT ---
    function App() {
      const [step, setStep] = useState(1); // 1: Settings, 2: Teachers, 3: Timetable & Stats
      const [teachers, setTeachers] = useState(INITIAL_TEACHERS);
      const [examSettings, setExamSettings] = useState(DEFAULT_EXAM_SETTINGS);
      const [scheduleResult, setScheduleResult] = useState(null);
      const [viewMode, setViewMode] = useState('classroom'); // 'classroom', 'teacher', 'timeline'
      const [selectedTeacherFilter, setSelectedTeacherFilter] = useState('');
      const [selectedSlotModal, setSelectedSlotModal] = useState(null);

      // Filter & Search states for Step 2 Teacher Table
      const [teacherSearch, setTeacherSearch] = useState('');
      const [filterGender, setFilterGender] = useState('ALL');
      const [filterHomeroom, setFilterHomeroom] = useState('ALL');

      // Modal state for Add/Edit Teacher
      const [teacherModalOpen, setTeacherModalOpen] = useState(false);
      const [editingTeacher, setEditingTeacher] = useState(null);
      const [teacherForm, setTeacherForm] = useState({ name: '', gender: '여', subject: '국어', homeroom: '없음', remarks: '' });

      // Run schedule generation whenever moving to Step 3 or triggering manually
      const handleGenerateSchedule = () => {
        const result = generateProctorSchedule(teachers, examSettings);
        setScheduleResult(result);
        setStep(3);
      };

      // Handle Teacher Add / Edit
      const handleSaveTeacher = () => {
        if (!teacherForm.name.trim()) {
          alert('교사 이름을 입력해주세요.');
          return;
        }

        if (editingTeacher) {
          setTeachers(prev => prev.map(t => t.id === editingTeacher.id ? { ...t, ...teacherForm } : t));
        } else {
          const newId = `T${String(teachers.length + 1).padStart(2, '0')}`;
          setTeachers(prev => [...prev, { id: newId, ...teacherForm }]);
        }
        setTeacherModalOpen(false);
        setEditingTeacher(null);
        setTeacherForm({ name: '', gender: '여', subject: '국어', homeroom: '없음', remarks: '' });
      };

      const handleEditTeacherClick = (t) => {
        setEditingTeacher(t);
        setTeacherForm({ name: t.name, gender: t.gender, subject: t.subject, homeroom: t.homeroom, remarks: t.remarks || '' });
        setTeacherModalOpen(true);
      };

      const handleDeleteTeacher = (id) => {
        if (confirm('이 교사 정보를 삭제하시겠습니까?')) {
          setTeachers(prev => prev.filter(t => t.id !== id));
        }
      };

      // Reset to preset data
      const handleLoadPreset = () => {
        if (confirm('기본 26명 교사 및 3일차 시험 설정 샘플 데이터를 불러오시겠습니까?')) {
          setTeachers(INITIAL_TEACHERS);
          setExamSettings(DEFAULT_EXAM_SETTINGS);
        }
      };

      // Export Timetable to CSV
      const exportToCSV = () => {
        if (!scheduleResult) return;

        let csvContent = "\uFEFF"; // UTF-8 BOM
        csvContent += "일차,교시,학년,학급,시험과목,정감독,정감독성별,부감독,부감독성별,제약위반경고\n";

        scheduleResult.slots.forEach(s => {
          const main = teachers.find(t => t.id === s.mainProctorId);
          const asst = teachers.find(t => t.id === s.assistantProctorId);
          const warningStr = s.warnings.join('; ') || '정상';

          csvContent += `${s.day}일차,${s.period}교시,${s.grade}학년,${s.className},${s.subject},${main ? main.name : '미배정'},${main ? main.gender : '-'},${asst ? asst.name : '미배정'},${asst ? asst.gender : '-'},"${warningStr}"\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.setAttribute('href', url);
        link.setAttribute('download', `시험감독배정표_${examSettings.title}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      // Manual Slot Proctor Swap Handler
      const handleManualSwap = (slotId, newMainId, newAsstId) => {
        if (!scheduleResult) return;

        setScheduleResult(prev => {
          const updatedSlots = prev.slots.map(s => {
            if (s.id === slotId) {
              const warnings = [];
              const main = teachers.find(t => t.id === newMainId);
              const asst = teachers.find(t => t.id === newAsstId);

              if (main && asst) {
                if (main.gender === '남' && asst.gender === '남') warnings.push('⚠️ [경고] 남교사 동시 배정 금지 위반');
                if (main.homeroom === s.className || asst.homeroom === s.className) warnings.push('⚠️ [경고] 자기 반 담임 배정 금지 위반');
                if (main.subject === s.subject || asst.subject === s.subject) warnings.push('⚠️ [경고] 해당 교시 과목 교사 배정 금지 위반');
              }

              return { ...s, mainProctorId: newMainId, assistantProctorId: newAsstId, warnings };
            }
            return s;
          });

          // Recalculate stats
          const newStats = {};
          teachers.forEach(t => {
            newStats[t.id] = { total: 0, main: 0, assistant: 0, gradeCounts: { 2: 0, 3: 0, 1: 0 } };
          });

          updatedSlots.forEach(s => {
            if (s.mainProctorId && newStats[s.mainProctorId]) {
              newStats[s.mainProctorId].total += 1;
              newStats[s.mainProctorId].main += 1;
              newStats[s.mainProctorId].gradeCounts[s.grade] = (newStats[s.mainProctorId].gradeCounts[s.grade] || 0) + 1;
            }
            if (s.assistantProctorId && newStats[s.assistantProctorId]) {
              newStats[s.assistantProctorId].total += 1;
              newStats[s.assistantProctorId].assistant += 1;
              newStats[s.assistantProctorId].gradeCounts[s.grade] = (newStats[s.assistantProctorId].gradeCounts[s.grade] || 0) + 1;
            }
          });

          return { ...prev, slots: updatedSlots, teacherStats: newStats };
        });

        setSelectedSlotModal(null);
      };

      // Filtered teachers list for Step 2 table
      const filteredTeachers = useMemo(() => {
        return teachers.filter(t => {
          const matchName = t.name.includes(teacherSearch) || t.subject.includes(teacherSearch) || t.homeroom.includes(teacherSearch);
          const matchGender = filterGender === 'ALL' || t.gender === filterGender;
          const matchHomeroom = filterHomeroom === 'ALL' || (filterHomeroom === 'HOMEROOM' ? t.homeroom !== '없음' : t.homeroom === '없음');
          return matchName && matchGender && matchHomeroom;
        });
      }, [teachers, teacherSearch, filterGender, filterHomeroom]);

        <div class="flex flex-col flex-1 pb-10">

                </div>
                <div>
                  <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-sky-400 via-indigo-300 to-purple-400 bg-clip-text text-transparent">
                    학교 시험감독 자동 배정 시스템
                  </h1>
                  <p class="text-xs text-slate-400">School Exam Proctor Scheduling System &bull; 제약 만족 최적화 알고리즘</p>
                </div>
              </div>

              <!-- Quick Status Badges & Preset Button -->
              <div class="flex items-center space-x-2 text-xs">
                <span class="px-2.5 py-1 rounded-full bg-slate-800 border border-slate-700 text-slate-300 font-medium">
                  <i class="fa-solid fa-users text-sky-400 mr-1.5"></i> 교사 <span class="text-sky-400 font-bold">{teachers.length}</span>명

                    {Array.from({ length: examSettings.daysCount }).map((_, dIdx) => {
                      const day = dIdx + 1;
                      const daySlots = scheduleResult.slots.filter(s => s.day === day);
                      const periods = Array.from(new Set(daySlots.map(s => s.period))).sort((a,b)=>a-b);

                      return (
                        <div key={day} class="glass-card rounded-2xl p-5 border border-slate-800 space-y-4 shadow-xl print-card">
                          <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                            <h3 class="text-base font-bold text-sky-300 flex items-center">
                              <span class="w-7 h-7 rounded-xl bg-sky-950 border border-sky-800 flex items-center justify-center mr-2 text-sm text-sky-400 font-outfit">{day}</span>
                              <span>{day}일차 시험 감독 시간표</span>
                            </h3>
                            <span class="text-xs text-slate-400 font-medium">총 {daySlots.length}개 학급 슬롯</span>
                          </div>

                          <div class="overflow-x-auto">
                            <table class="w-full text-center border-collapse text-xs">
                              <thead>
                                <tr class="bg-slate-900/90 text-slate-300 border-b border-slate-800">
                                  <th class="py-2.5 px-3 w-20">교시</th>
                                  {examSettings.grades.map(g => (
                                    (examSettings.classesPerGrade[g] || []).map(c => (
                                      <th key={c} class="py-2.5 px-3 border-l border-slate-800/80 font-bold text-sky-300">
                                        {c}
                                      </th>
                                    ))
                                  ))}
                                </tr>
                              </thead>
                              <tbody class="divide-y divide-slate-800/60">
                                {periods.map(period => (
                                  <tr key={period} class="hover:bg-slate-900/30">
                                    <td class="py-3 px-2 font-bold text-slate-300 bg-slate-900/60 border-r border-slate-800">
                                      {period}교시
                                    </td>
                                    {examSettings.grades.map(g => (
                                      (examSettings.classesPerGrade[g] || []).map(className => {
                                        const slot = daySlots.find(s => s.period === period && s.className === className);
                                        if (!slot) return <td key={className} class="border-l border-slate-800/60 bg-slate-950/40 text-slate-600 text-[10px]">-</td>;

                                        const main = teachers.find(t => t.id === slot.mainProctorId);
                                        const asst = teachers.find(t => t.id === slot.assistantProctorId);
                                        const hasWarning = slot.warnings.length > 0;

                                        return (
                                          <td key={className} 
                                              onClick={() => setSelectedSlotModal(slot)}
                                              class={`py-2 px-2 border-l border-slate-800/60 cursor-pointer transition-all hover:bg-sky-950/40 ${hasWarning ? 'bg-rose-950/30' : ''}`}>
                                            <div class="space-y-1">
                                              <!-- Subject Badge -->
                                              <div class="text-[10px] font-bold text-slate-400 bg-slate-900 px-1.5 py-0.5 rounded border border-slate-800 inline-block">
                                                {slot.subject}
                                              </div>

                                              <!-- Main Proctor -->
                                              <div class="flex items-center justify-center space-x-1 text-xs">
                                                <span class="text-[10px] font-semibold text-sky-400">정:</span>
                                                <span class={`font-bold ${main ? (main.gender==='남'?'text-sky-300':'text-rose-300') : 'text-slate-500'}`}>
                                                  {main ? main.name : '미배정'}
                                                </span>
                                                {main && <span class={`text-[9px] px-1 rounded ${main.gender==='남'?'bg-sky-950 text-sky-400':'bg-rose-950 text-rose-400'}`}>{main.gender}</span>}
                                              </div>

                                              <!-- Assistant Proctor -->
                                              <div class="flex items-center justify-center space-x-1 text-xs">
                                                <span class="text-[10px] font-semibold text-indigo-400">부:</span>
                                                <span class={`font-bold ${asst ? (asst.gender==='남'?'text-sky-300':'text-rose-300') : 'text-slate-500'}`}>
                                                  {asst ? asst.name : '미배정'}
                                                </span>
                                                {asst && <span class={`text-[9px] px-1 rounded ${asst.gender==='남'?'bg-sky-950 text-sky-400':'bg-rose-950 text-rose-400'}`}>{asst.gender}</span>}
                                              </div>

                                              {/* Warning badge */}
                                              {hasWarning && (
                                                <div class="text-[9px] text-rose-400 font-bold truncate" title={slot.warnings.join(', ')}>
                                                  ⚠️ 경고 발생
                                                </div>
                                              )}
                                            </div>
                                          </td>
                                        );
                                      })
                                    ))}
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </div>

                        </div>
                      );
                    })}
                  </div>
                )}


                <!-- TAB 2: TEACHER INDIVIDUAL TIMETABLE VIEW -->
                {viewMode === 'teacher' && (
                  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    {teachers
                      .filter(t => !selectedTeacherFilter || t.id === selectedTeacherFilter)
                      .map(t => {
                        const stats = scheduleResult.teacherStats[t.id] || { total: 0, main: 0, assistant: 0 };
                        const assignedSlots = scheduleResult.slots.filter(s => s.mainProctorId === t.id || s.assistantProctorId === t.id);

                        return (
                          <div key={t.id} class="glass-card rounded-2xl p-4 border border-slate-800 space-y-3">
                            <div class="flex justify-between items-center border-b border-slate-800 pb-2">
                              <div>
                                <span class="text-sm font-bold text-slate-100">{t.name} 선생님</span>
                                <span class="text-xs text-slate-400 ml-2">({t.subject})</span>
                              </div>
                              <div class="flex items-center space-x-1 text-xs">
                                <span class={`px-2 py-0.5 rounded-full text-[10px] font-bold ${t.gender==='남'?'bg-sky-950 text-sky-400 border border-sky-800':'bg-rose-950 text-rose-400 border border-rose-800'}`}>
                                  {t.gender}
                                </span>
                                <span class="px-2 py-0.5 rounded bg-indigo-950 text-indigo-300 font-bold text-[10px]">
                                  총 {stats.total}회 감독
                                </span>
                              </div>
                            </div>

                            <div class="space-y-2">
                              {assignedSlots.length === 0 ? (
                                <div class="text-xs text-slate-500 py-3 text-center">배정된 감독 일정이 없습니다.</div>
                              ) : (
                                assignedSlots.map(s => {
                                  const isMain = s.mainProctorId === t.id;
                                  return (
                                    <div key={s.id} class="bg-slate-900/80 p-2.5 rounded-xl border border-slate-800 flex items-center justify-between text-xs">
                                      <div class="flex items-center space-x-2">
                                        <span class="font-bold text-sky-400 font-outfit">{s.day}일차 {s.period}교시</span>
                                        <span class="font-bold text-slate-200">{s.className}</span>
                                        <span class="text-[10px] text-slate-400">({s.subject})</span>
                                      </div>
                                      <div>
                                        {isMain ? (
                                          <span class="px-2 py-0.5 rounded bg-sky-950 text-sky-300 font-bold text-[10px] border border-sky-800">
                                            정감독
                                          </span>
                                        ) : (
                                          <span class="px-2 py-0.5 rounded bg-indigo-950 text-indigo-300 font-bold text-[10px] border border-indigo-800">
                                            부감독
                                          </span>
                                        )}
                                      </div>
                                    </div>
                                  );
                                })
                              )}
                            </div>
                          </div>
                        );
                      })}
                  </div>
                )}


                <!-- TAB 3: WORKLOAD STATISTICS & FAIRNESS DASHBOARD -->
                {viewMode === 'stats' && (
                  <div class="glass-card rounded-2xl p-5 border border-slate-800 space-y-4 shadow-xl">
                    <h3 class="text-sm font-bold text-sky-300 flex items-center justify-between">
                      <span><i class="fa-solid fa-chart-pie mr-2"></i> 교사별 감독 배정 수량 &amp; 업무량 공정성 통계</span>
                      <span class="text-xs font-normal text-slate-400">정감독 / 부감독 횟수 및 학년별 분포</span>
                    </h3>

                    <div class="overflow-x-auto">
                      <table class="w-full text-left border-collapse text-xs">
                        <thead>
                          <tr class="bg-slate-900/90 text-slate-300 border-b border-slate-800">
                            <th class="py-2.5 px-4">교사명</th>
                            <th class="py-2.5 px-4">성별</th>
                            <th class="py-2.5 px-4">과목</th>
                            <th class="py-2.5 px-4">담임</th>
                            <th class="py-2.5 px-4 text-center">정감독 횟수</th>
                            <th class="py-2.5 px-4 text-center">부감독 횟수</th>
                            <th class="py-2.5 px-4 text-center font-bold text-sky-400">총 감독 횟수</th>
                            <th class="py-2.5 px-4">업무량 공정성 게이지</th>
                          </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-800/60">
                          {teachers.map(t => {
                            const stats = scheduleResult.teacherStats[t.id] || { total: 0, main: 0, assistant: 0 };
                            const maxPossible = Math.max(...Object.values(scheduleResult.teacherStats).map(s => s.total)) || 1;
                            const percent = (stats.total / maxPossible) * 100;

                            return (
                              <tr key={t.id} class="hover:bg-slate-900/40">
                                <td class="py-2.5 px-4 font-bold text-slate-100">{t.name}</td>
                                <td class="py-2.5 px-4">
                                  <span class={`px-2 py-0.5 rounded text-[10px] font-bold ${t.gender==='남'?'bg-sky-950 text-sky-400':'bg-rose-950 text-rose-400'}`}>
                                    {t.gender}
                                  </span>
                                </td>
                                <td class="py-2.5 px-4 text-slate-300">{t.subject}</td>
                                <td class="py-2.5 px-4 text-slate-400">{t.homeroom}</td>
                                <td class="py-2.5 px-4 text-center font-bold text-sky-300">{stats.main}회</td>
                                <td class="py-2.5 px-4 text-center font-bold text-indigo-300">{stats.assistant}회</td>
                                <td class="py-2.5 px-4 text-center font-extrabold text-amber-400 text-sm font-outfit">{stats.total}회</td>
                                <td class="py-2.5 px-4">
                                  <div class="w-full bg-slate-900 h-2.5 rounded-full overflow-hidden flex border border-slate-800">
                                    <div class="bg-gradient-to-r from-sky-500 to-indigo-500 h-full transition-all duration-300" style={{ width: `${percent}%` }}></div>
                                  </div>
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}

              </div>
            )}

          </main>


          <!-- MODAL 1: ADD / EDIT TEACHER MODAL -->
          {teacherModalOpen && (
            <div class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div class="glass-card rounded-2xl p-6 max-w-md w-full border border-slate-700 space-y-4 shadow-2xl animate-fade-in">
                <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                  <h3 class="text-base font-bold text-slate-100">
                    {editingTeacher ? '교사 정보 수정' : '신규 교사 등록'}
                  </h3>
                  <button onClick={() => setTeacherModalOpen(false)} class="text-slate-400 hover:text-slate-200">
                    <i class="fa-solid fa-xmark text-lg"></i>
                  </button>
                </div>

                <div class="space-y-3 text-xs">
                  <div class="space-y-1">
                    <label class="font-medium text-slate-300">교사 이름</label>
                    <input type="text" value={teacherForm.name} 
                           onChange={(e) => setTeacherForm({...teacherForm, name: e.target.value})}
                           placeholder="예: 홍길동"
                           class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-slate-100 focus:border-sky-500 focus:outline-none" />
                  </div>

                  <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                      <label class="font-medium text-slate-300">성별</label>
                      <select value={teacherForm.gender} 
                              onChange={(e) => setTeacherForm({...teacherForm, gender: e.target.value})}
                              class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-slate-100 focus:border-sky-500 focus:outline-none">
                        <option value="여">여교사</option>
                        <option value="남">남교사</option>
                      </select>
                    </div>

                    <div class="space-y-1">
                      <label class="font-medium text-slate-300">담당 과목</label>
                      <input type="text" value={teacherForm.subject} 
                             onChange={(e) => setTeacherForm({...teacherForm, subject: e.target.value})}
                             placeholder="예: 수학"
                             class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-slate-100 focus:border-sky-500 focus:outline-none" />
                    </div>
                  </div>

                  <div class="space-y-1">
                    <label class="font-medium text-slate-300">담임 학반 (해당 학반 감독 제외)</label>
                    <input type="text" value={teacherForm.homeroom} 
                           onChange={(e) => setTeacherForm({...teacherForm, homeroom: e.target.value})}
                           placeholder="예: 2-1 (없으면 '없음')"
                           class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-slate-100 focus:border-sky-500 focus:outline-none" />
                  </div>

                  <div class="space-y-1">
                    <label class="font-medium text-slate-300">비고 / 참고 사항</label>
                    <input type="text" value={teacherForm.remarks} 
                           onChange={(e) => setTeacherForm({...teacherForm, remarks: e.target.value})}
                           placeholder="예: 부장교사"
                           class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-slate-100 focus:border-sky-500 focus:outline-none" />
                  </div>
                </div>

                <div class="flex justify-end space-x-2 pt-2">
                  <button onClick={() => setTeacherModalOpen(false)} class="px-4 py-2 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs">
                    취소
                  </button>
                  <button onClick={handleSaveTeacher} class="px-4 py-2 rounded-xl bg-sky-600 hover:bg-sky-500 text-white font-bold text-xs shadow-lg">
                    저장하기
                  </button>
                </div>
              </div>
            </div>
          )}


          <!-- MODAL 2: MANUAL SLOT PROCTOR SWAP MODAL -->
          {selectedSlotModal && (
            <div class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div class="glass-card rounded-2xl p-6 max-w-lg w-full border border-slate-700 space-y-4 shadow-2xl">
                <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                  <div>
                    <h3 class="text-base font-bold text-slate-100 flex items-center">
                      <span class="w-6 h-6 rounded bg-sky-950 border border-sky-800 flex items-center justify-center text-sky-400 font-outfit text-xs mr-2">
                        {selectedSlotModal.day}
                      </span>
                      <span>{selectedSlotModal.day}일차 {selectedSlotModal.period}교시 [{selectedSlotModal.className}] 감독 변경</span>
                    </h3>
                    <p class="text-xs text-slate-400 mt-0.5">시험과목: <span class="text-sky-300 font-bold">{selectedSlotModal.subject}</span></p>
                  </div>
                  <button onClick={() => setSelectedSlotModal(null)} class="text-slate-400 hover:text-slate-200">
                    <i class="fa-solid fa-xmark text-lg"></i>
                  </button>
                </div>

                <!-- Warnings if any -->
                {selectedSlotModal.warnings.length > 0 && (
                  <div class="bg-rose-950/80 border border-rose-800 rounded-xl p-3 text-rose-200 text-xs space-y-1">
                    {selectedSlotModal.warnings.map((w, idx) => (
                      <div key={idx} class="font-bold flex items-center">
                        <i class="fa-solid fa-triangle-exclamation mr-1.5 text-rose-400"></i> {w}
                      </div>
                    ))}
                  </div>
                )}

                <div class="space-y-4 text-xs">
                  <!-- Main Proctor Selector -->
                  <div class="space-y-1.5">
                    <label class="font-bold text-sky-300 flex items-center">
                      <span class="w-2 h-2 rounded-full bg-sky-400 mr-1.5"></span> 정감독 선택
                    </label>
                    <select id="modal-main-select" defaultValue={selectedSlotModal.mainProctorId || ''}
                            class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-slate-100 focus:border-sky-500 focus:outline-none">
                      <option value="">미배정</option>
                      {teachers.map(t => (
                        <option key={t.id} value={t.id}>
                          {t.name} ({t.gender}, {t.subject}, 담임:{t.homeroom})
                        </option>
                      ))}
                    </select>
                  </div>

                  <!-- Assistant Proctor Selector -->
                  <div class="space-y-1.5">
                    <label class="font-bold text-indigo-300 flex items-center">
                      <span class="w-2 h-2 rounded-full bg-indigo-400 mr-1.5"></span> 부감독 선택
                    </label>
                    <select id="modal-asst-select" defaultValue={selectedSlotModal.assistantProctorId || ''}
                            class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-slate-100 focus:border-indigo-500 focus:outline-none">
                      <option value="">미배정</option>
                      {teachers.map(t => (
                        <option key={t.id} value={t.id}>
                          {t.name} ({t.gender}, {t.subject}, 담임:{t.homeroom})
                        </option>
                      ))}
                    </select>
                  </div>
                </div>

                <div class="flex justify-end space-x-2 pt-2">
                  <button onClick={() => setSelectedSlotModal(null)} class="px-4 py-2 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs">
                    취소
                  </button>
                  <button onClick={() => {
                    const mainId = document.getElementById('modal-main-select').value;
                    const asstId = document.getElementById('modal-asst-select').value;
                    handleManualSwap(selectedSlotModal.id, mainId, asstId);
                  }} class="px-4 py-2 rounded-xl bg-sky-600 hover:bg-sky-500 text-white font-bold text-xs shadow-lg">
                    감독 수동 변경 적용
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // Render App
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
